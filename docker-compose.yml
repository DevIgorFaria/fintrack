services:
  postgres:
    image: postgres:16
    container_name: fintrack-postgres
    restart: always
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack_user
      POSTGRES_PASSWORD: fintrack_pass
    ports:
      - "5432:5432"
    volumes:
      - fintrack_postgres_data:/var/lib/postgresql/data

volumes:
  fintrack_postgres_data: